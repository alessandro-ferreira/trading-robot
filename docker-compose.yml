services:
  # Test database for the go-bot
  test-db:
    image: timescale/timescaledb:latest-pg14
    container_name: trading-bot-test-db
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
      - POSTGRES_DB=testdb
    ports:
      # Exposes the test DB on port 5433 to avoid conflicts with a local dev DB on 5432
      - "5433:5432"
    volumes:
      - test-db-data:/var/lib/postgresql/data

  python-gateway:
    build:
      context: ./robot/python-gateway
    container_name: trading-bot-python-gateway
    command: ["python", "main.py", "--config", "/config.toml"]
    volumes:
      - ./robot/python-gateway:/app
      - ./robot/config.toml:/config.toml:ro
    depends_on:
      - test-db
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "15051:50051"  # Expose gRPC port (host:container, avoids local conflict)

volumes:
  test-db-data:
