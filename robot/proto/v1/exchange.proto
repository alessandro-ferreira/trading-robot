// Defines the gRPC contract for communication between the Go trading bot
// and the Python exchange gateway.

syntax = "proto3";

package v1;

// The option go_package tells the protoc compiler where to output the generated
// Go code. The path is relative to the go-bot's module root.
option go_package = "trading/robot/go-bot/gen/go/v1;v1";

// ExchangeService defines the gRPC service for interacting with a cryptocurrency exchange.
service ExchangeService {
  // Ping is a simple health check method to verify that the gateway is alive
  // and can communicate with the exchange.
  rpc Ping(PingRequest) returns (PingResponse) {}
}

// PingRequest is the message sent to the Ping RPC.
message PingRequest {}

// PingResponse is the message returned from the Ping RPC.
message PingResponse {
  string message = 1;
}