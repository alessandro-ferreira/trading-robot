// Defines the gRPC contract for communication between the Go trading bot
// and the Python exchange gateway.

syntax = "proto3";

package v1;

// The option go_package tells the protoc compiler where to output the generated
// Go code. The path is relative to the go-bot's module root.
option go_package = "go-bot/gen/go/v1;v1";

// ExchangeService defines the gRPC service for interacting with a cryptocurrency exchange.
service ExchangeService {
  // Ping is a simple health check method to verify that the gateway is alive
  // and can communicate with the exchange.
  rpc Ping(PingRequest) returns (PingResponse) {}

  // GetTicker fetches the current price for a given symbol.
  rpc GetTicker(GetTickerRequest) returns (TickerResponse) {}

  // GetBalance fetches the account balance.
  rpc GetBalance(GetBalanceRequest) returns (BalanceResponse) {}

  // CreateOrder places a new order on the exchange.
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse) {}

  // CancelOrder cancels an existing order.
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse) {}

  // GetOrder fetches details of a specific order.
  rpc GetOrder(GetOrderRequest) returns (OrderResponse) {}

  // GetOpenOrders fetches all open orders for a symbol.
  rpc GetOpenOrders(GetOrdersRequest) returns (OrdersResponse) {}

  // GetRecentTrades fetches recent execution history for a symbol.
  rpc GetRecentTrades(GetOrdersRequest) returns (OrdersResponse) {}

  // ResetState resets the state of the exchange.
  // WARN: This method is intended for testing purposes only.
  rpc ResetState(ResetStateRequest) returns (ResetStateResponse) {}
}

// PingRequest is the message sent to the Ping RPC.
message PingRequest {}

// PingResponse is the message returned from the Ping RPC.
message PingResponse {
  string message = 1;
}

// GetTickerRequest is the message sent to the GetTicker RPC.
message GetTickerRequest {
  string exchange = 1;
  string symbol = 2;
}

// TickerResponse is the message returned from the GetTicker RPC.
message TickerResponse {
  string symbol = 1;
  double price = 2;
}

// GetBalanceRequest is the message sent to the GetBalance RPC.
message GetBalanceRequest {
  string exchange = 1;
  optional string currency = 2; // Optional: if provided, can be used for filtering on some exchanges
}

// BalanceObject represents the balance components for a specific asset.
message BalanceObject {
  string asset = 1;
  double free = 2;
  double used = 3;
  double total = 4;
}

// BalanceResponse is the message returned from the GetBalance RPC.
message BalanceResponse {
  repeated BalanceObject balances = 1;
}

// CreateOrderRequest is the message sent to the CreateOrder RPC.
message CreateOrderRequest {
  string exchange = 1;
  string symbol = 2;
  string side = 3; // "buy" or "sell"
  string type = 4; // "limit" or "market"
  double amount = 5;
  double price = 6;
}

// OrderResponse is the message returned from order-related RPCs.
message OrderResponse {
  string id = 1;
  string symbol = 2;
  string side = 3;
  string type = 4;
  double amount = 5;
  double price = 6;
  string status = 7;
  double filled = 8;
  double remaining = 9;
  double cost = 10;
  double average = 11;
  string client_order_id = 12;
  int64 timestamp = 13;
}

// CancelOrderRequest is the message sent to the CancelOrder RPC.
message CancelOrderRequest {
  string exchange = 1;
  string id = 2;
  string symbol = 3;
}

// CancelOrderResponse is the message returned from the CancelOrder RPC.
message CancelOrderResponse {
  string id = 1;
  string status = 2;
}

// GetOrderRequest is the message sent to the GetOrder and GetRecentTrades RPCs.
message GetOrderRequest {
  string exchange = 1;
  string id = 2;
  string symbol = 3;
}

// GetOpenOrdersRequest is the message sent to the GetOpenOrders RPC and GetRecentTrades RPCs.
message GetOrdersRequest {
  string exchange = 1;
  optional string symbol = 2; // Optional: if empty, fetches all open orders for the exchange
  optional int64 since = 3; // Optional: millisecond timestamp for date-based pagination
  optional int32 limit = 4; // Optional: limit the number of results returned
}

// OpenOrdersResponse is the message returned from the GetOpenOrders RPC.
message OrdersResponse {
  repeated OrderResponse orders = 1;
}

// ResetStateRequest is the message sent to the ResetState RPC.
message ResetStateRequest {}

// ResetStateResponse is the message returned from the ResetState RPC.
message ResetStateResponse {
  string status = 1;
}
