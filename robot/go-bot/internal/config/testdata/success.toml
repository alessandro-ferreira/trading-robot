[server]
orchestrator_interval = "10s"
shutdown_timeout = "30s"

[log]
level = "info"
format = "json"
source = false

[database]
host = "localhost"
port = 5432
user = "testuser"
password = "testpassword"
dbname = "testdb"
sslmode = "disable"

[grpc]
python_gateway_address = "localhost:50051"

[health_check]
asset = "BTC"
interval = "3m"
retry_attempts = 2
retry_delay = "1s"

[risk]
max_open_positions = 3
max_daily_loss = 100.0

[[exchange]]
name = "binance"
sandbox_mode = true
health_check = true

[[exchange]]
name = "coinbase"
sandbox_mode = false
health_check = false

[[pairs]]
symbol = "BTC/USDT"
exchange = "binance"
[pairs.risk]
risk_per_trade = 50.0
[pairs.strategy]
type = "momentum_trailing"
[pairs.strategy.momentum]
window_seconds = 3600
threshold = 0.005

[[pairs]]
symbol = "ETH/USDT"
exchange = "binance"
[pairs.risk]
risk_per_trade = 25.0
[pairs.strategy]
type = "momentum_profit"
[pairs.strategy.momentum]
window_seconds = 3600
stop_loss_pct = 0.02
profit_target_pct = 0.05
