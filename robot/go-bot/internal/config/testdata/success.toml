[server]
orchestrator_interval = "10s"
refresh_strat_interval = "1m"
default_exchange_timeout = "10s"
shutdown_timeout = "30s"

[go_log]
level = "info"
format = "json"
path = "/var/log/go-bot.log"
rotate = true
source = false

[database]
host = "localhost"
port = 5432
user = "testuser"
password = "testpassword"
dbname = "testdb"
sslmode = "disable"

[grpc]
go_bot_address = "localhost:50050"
python_gateway_address = "localhost:50051"
management_address = "0.0.0.0:50052"
connection_timeout = "5s"

[health_check]
asset = "BTC"
interval = "3m"
retry_attempts = 2
retry_delay = "1s"

[risk]
max_open_positions = 3
max_budget_per_trade = { USDT = 100.0, BRL = 500.0 }

[[exchange]]
name = "binance"
sandbox_mode = true
health_check = true

[[exchange]]
name = "coinbase"
sandbox_mode = false
health_check = false
