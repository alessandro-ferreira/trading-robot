[server]
orchestrator_interval = "10s"
shutdown_timeout = "30s"

[log]
level = "info"
format = "json"
source = false

[database]
host = "localhost"
port = 5432
user = "testuser"
password = "testpassword"
dbname = "testdb"
sslmode = "disable"

[grpc]
python_gateway_address = "localhost:50051"

[health_check]
asset = "BTC"
interval = "3m"
retry_attempts = 2
retry_delay = "1s"

[risk]
max_open_positions = 3
max_daily_loss = 100.0

[[exchange]]
name = "binance"
sandbox_mode = true
health_check = true

[[exchange]]
name = "coinbase"
sandbox_mode = false
health_check = false
