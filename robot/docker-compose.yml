services:
  # database for the go-bot integration tests
  test-db:
    image: timescale/timescaledb:latest-pg16
    container_name: trading-bot-test-db
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
      - POSTGRES_DB=testdb
    ports:
      # Exposes the test DB on port 5433 to avoid conflicts with a local dev DB on 5432
      - "5433:5432"
    volumes:
      - test-db-data:/var/lib/postgresql/data
      # Mount the migrations folder so the database can init.
      - ./go-bot/migrations:/migrations

  # gateway for the go-bot integration tests
  python-gateway:
    build:
      context: ./python-gateway
    container_name: trading-bot-python-gateway
    user: "1000:1000"  # Forces the process to run with UID 1000 instead of root (UID 0)
    command: ["python", "main.py", "--config", "/config.toml"]
    volumes:
      - ./python-gateway:/app
      - ./config.toml:/config.toml:ro
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "15051:50051"  # Expose gRPC port (host:container, avoids local conflict)

volumes:
  test-db-data:
