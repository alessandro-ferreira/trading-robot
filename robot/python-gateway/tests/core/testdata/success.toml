[server]
default_exchange_timeout = "5s"
shutdown_timeout = "2s"

[grpc]
python_gateway_address = "localhost:9999"

[python_log]
level = "debug"
format = "json"
path = "/var/log/python_gateway.log"
rotate = true
source = true

[[exchange]]
name = "mercadobitcoin"
api_key = "test_api_key"
api_secret = "test_secret"
sandbox_mode = false
