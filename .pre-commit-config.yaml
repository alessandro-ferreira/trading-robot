repos:
  # General Code Hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        files: ^robot/|^ml-engine/
      - id: end-of-file-fixer
        files: ^robot/|^ml-engine/
      - id: check-yaml
        files: ^robot/|^ml-engine/
      - id: check-added-large-files
        files: ^robot/|^ml-engine/

  # Python Gateway
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [ --fix ]
        files: ^robot/python-gateway/
        exclude: ^robot/python-gateway/v1/
      - id: ruff-format
        files: ^robot/python-gateway/
        exclude: ^robot/python-gateway/v1/

  # Go Bot
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        files: ^robot/go-bot/
        types: [go]
        exclude: ^robot/go-bot/gen/
      - id: go-imports
        files: ^robot/go-bot/
        types: [go]
        exclude: ^robot/go-bot/gen/

  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go-mod-tidy
        entry: bash -c 'cd robot/go-bot && go mod tidy'
        language: system
        files: ^robot/go-bot/
        pass_filenames: false

  - repo: local
    hooks:
      - id: golines
        name: golines
        entry: golines
        language: system
        types: [go]
        files: ^robot/go-bot/
        exclude: ^robot/go-bot/gen/|.*_test\.go$
        args: [ --max-len=110, -w, --reformat-tags ]

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.5
    hooks:
      - id: golangci-lint
        files: ^robot/go-bot/
        types: [go]
        exclude: ^robot/go-bot/gen/
        # Run from the module directory to resolve dependencies correctly
        entry: bash -c 'cd robot/go-bot && golangci-lint run'
        pass_filenames: false

  # C++ Strategy Core / ML Engine
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        types_or: [c++, c]
        files: ^robot/strategy-core/|^ml-engine/
        args: ['--style={BasedOnStyle: Google, ColumnLimit: 120, IndentWidth: 4}']

  # Local Tests
  - repo: local
    hooks:
      - id: python-tests
        name: python-tests
        # Using make ensures consistency with the Makefile
        entry: bash -c 'cd robot/python-gateway && make test'
        language: system
        types: [python]
        files: ^robot/python-gateway/
        pass_filenames: false
      - id: go-tests
        name: go-tests
        # Using make ensures consistency with the Makefile
        entry: bash -c 'cd robot/go-bot && make test-all'
        language: system
        types: [go]
        files: ^robot/go-bot/
        pass_filenames: false
      - id: cpp-tests
        name: cpp-tests
        # Using make ensures consistency with the Makefile
        entry: bash -c 'cd robot/strategy-core && make test'
        language: system
        types_or: [c++, c]
        files: ^robot/strategy-core/
        pass_filenames: false
      - id: ml-engine-tests
        name: ml-engine-tests
        # Using make ensures consistency with the Makefile
        entry: bash -c 'cd ml-engine && make test'
        language: system
        types: [c++]
        files: ^ml-engine/
        pass_filenames: false

  # Commit Message Checker
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
